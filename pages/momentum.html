<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Momentum — CFClub</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚛</text></svg>" />
	<link rel="stylesheet" href="../styles.css">
</head>
<body>
	<nav class="navbar">
		<div class="nav-container">
			<a href="../index.html" class="logo"></a>
			<button onclick="openModal()">Sign Up</button>
		</div>
	</nav>
 
	<main>
		<article>
			<h2>Momentum Indicators</h2>
			<p class="subtitle">Enter one or more ticker symbols separated by commas</p>

			<input id="q" type="text" placeholder="AMZN, TSLA, NVDA" />
			<button id="fetchBtn" class="primary">Fetch</button>
			<span id="status" class="status" aria-live="polite"></span>

			<div id="result"></div>
		</article>
	</main>
 
	<script src="../scripts/footer.js"></script>
	<script>
		const API_BASE = 'https://yfinance-phi.vercel.app';

		function qs(name){ return new URLSearchParams(location.search).get(name); }
 
		function fmt(num, digits=2){
			if (num == null || isNaN(num)) return '—';
			return Number(num).toLocaleString(undefined, {maximumFractionDigits: digits});
		}
 
		function verdictClass(v){
			v = (v||'').toLowerCase();
			if (v.includes('bear')) return 'bad';
			if (v.includes('bull')) return 'good';
			return 'warn';
		}
 
		function buildDetail(d){
			const metrics = [
				{k:'rsi_14',          label:'RSI (14)'},
				{k:'macd',            label:'MACD / Signal / Hist'},
				{k:'adx',             label:'ADX'},
				{k:'stochastic',      label:'Stochastic K / D'},
				{k:'roc_10',          label:'ROC 10'},
				{k:'roc_20',          label:'ROC 20'},
				{k:'ma50',            label:'MA 50'},
				{k:'ma200',           label:'MA 200'},
				{k:'volume_ratio',    label:'Volume Ratio'},
				{k:'ma_signal',       label:'MA Signal'},
				{k:'volume_signal',   label:'Volume Signal'},
				{k:'obv_trend',       label:'OBV Trend'},
				{k:'divergence',      label:'Divergence'},
				{k:'bullish_signals', label:'Bullish Signals'},
			];
 
			const tiles = metrics.map(m => {
				let val;
				if (m.k === 'macd' && d.macd)
					val = `${fmt(d.macd.macd)} / ${fmt(d.macd.signal)} / ${fmt(d.macd.hist)}`;
				else if (m.k === 'stochastic' && d.stochastic)
					val = `${fmt(d.stochastic.k)} / ${fmt(d.stochastic.d)}`;
				else
					val = d[m.k] != null ? (typeof d[m.k] === 'number' ? fmt(d[m.k]) : d[m.k]) : '—';
				return `<div class="metric"><div class="mlabel">${m.label}</div><div class="mvalue">${val}</div></div>`;
			}).join('');
 
			const vc = verdictClass(d.verdict);
			return `
				<div class="detail-inner">
					<div class="detail-grid">${tiles}</div>
					<div class="verdict ${vc}">${d.verdict || 'No verdict'}</div>
				</div>
			`;
		}
 
		function renderTable(items){
			const result = document.getElementById('result');
			result.innerHTML = '';
 
			if (!items.length){
				result.innerHTML = '<p class="err">No data returned.</p>';
				return;
			}
 
			const table = document.createElement('table');
			const thead = `<thead><tr>
				<th>Ticker</th>
				<th>Price</th>
				<th>Change %</th>
				<th>52w Low</th>
				<th>52w High</th>
				<th>% from High</th>
				<th>RSI (14)</th>
				<th>ADX</th>
				<th>Verdict</th>
			</tr></thead>`;
			table.innerHTML = thead + '<tbody></tbody>';
			result.appendChild(table);
			const tbody = table.querySelector('tbody');
 
			const verdictColors = {good:'#4ade80', bad:'#f87171', warn:'#fbbf24'};
 
			items.forEach((d, i) => {
				const pc  = d.pct_change ?? 0;
				const pfh = d.pct_from_52w_high ?? 0;
				const vc  = verdictClass(d.verdict);
 
				const sumRow = document.createElement('tr');
				sumRow.innerHTML = `
					<td>${d.ticker}</td>
					<td>${fmt(d.current_price)}</td>
					<td class="${pc >= 0 ? 'up' : 'down'}">${pc >= 0 ? '+' : ''}${fmt(pc)}%</td>
					<td>${fmt(d['52w_low'])}</td>
					<td>${fmt(d['52w_high'])}</td>
					<td class="${pfh >= 0 ? 'up' : 'down'}">${fmt(pfh, 0)}%</td>
					<td>${fmt(d.rsi_14, 1)}</td>
					<td>${fmt(d.adx, 1)}</td>
					<td style="color:${verdictColors[vc]}">${d.verdict || '—'}</td>
				`;
 
				const detRow = document.createElement('tr');
				const detCell = document.createElement('td');
				detCell.colSpan = 9;
				detCell.innerHTML = buildDetail(d);
				detRow.appendChild(detCell);
 
				sumRow.addEventListener('click', () => {
					const open = detRow.style.display === '';
					detRow.style.display = open ? 'none' : '';
				});
 
				tbody.appendChild(sumRow);
				tbody.appendChild(detRow);
			});
		}
 
		async function fetchAndRender(q){
			const result = document.getElementById('result');
			const status = document.getElementById('status');
			const btn    = document.getElementById('fetchBtn');
 
			result.innerHTML = '';
			status.textContent = '';
			if (!q) return;
 
			status.textContent = 'Loading…';
			btn.disabled = true;
 
			try {
				const tickers = q.split(',').map(s => s.trim().toUpperCase()).filter(Boolean);

				let items = [];

				if (tickers.length === 1) {
					// Single ticker: GET /momentum/{ticker}
					const url = `${API_BASE}/momentum/${encodeURIComponent(tickers[0])}`;
					const resp = await fetch(url);
					if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
					const json = await resp.json();
					items = json && json.ticker ? [json] : [];
				} else {
					// Multiple tickers: GET /momentum/multiple/?tickers=A,B,C
					const url = `${API_BASE}/momentum/multiple/?tickers=${encodeURIComponent(tickers.join(','))}`;
					const resp = await fetch(url);
					if (!resp.ok) throw new Error(`${resp.status} ${resp.statusText}`);
					const json = await resp.json();
					// Backend returns { tickers: { "AMZN": {...}, "TSLA": {...} } }
					if (json && json.tickers && typeof json.tickers === 'object') {
						items = Object.values(json.tickers).filter(Boolean);
					} else if (Array.isArray(json)) {
						items = json;
					}
				}
 
				renderTable(items);
			} catch(err){
				result.innerHTML = `<p class="err">Lookup failed: ${err.message}</p>`;
			} finally {
				status.textContent = '';
				btn.disabled = false;
			}
		}
 
		document.getElementById('fetchBtn').addEventListener('click', () => {
			fetchAndRender(document.getElementById('q').value.trim());
		});
 
		document.getElementById('q').addEventListener('keydown', e => {
			if (e.key === 'Enter') fetchAndRender(document.getElementById('q').value.trim());
		});
 	</script>
</body>
</html>
