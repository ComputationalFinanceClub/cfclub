<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width,initial-scale=1" />
	<title>Momentum — CFClub</title>
	<link rel="stylesheet" href="../styles.css">
	<style>
		.container{max-width:900px;margin:36px auto;padding:20px}
		.controls{display:flex;gap:8px;align-items:center;margin-bottom:18px}
		input[type=text]{flex:1;padding:8px;font-size:16px}
		button{padding:8px 12px}
		.card{border:1px solid #e6e6e6;border-radius:8px;padding:16px;background:#fe0101}
		.row{display:flex;gap:12px;flex-wrap:wrap}
		.metric{flex:1;min-width:160px;padding:8px}
		.label{font-size:12px;color:#666}
		.value{font-size:18px;font-weight:600}
		.verdict{font-size:20px;font-weight:700;padding:10px;border-radius:6px;text-align:center;margin-top:12px}
		.good{background:#e6ffed;color:#05672d}
		.bad{background:#ffebeb;color:#a30000}
		.warn{background:#fff7e6;color:#6a4400}
		pre{white-space:pre-wrap;word-break:break-word;background:#f9f9f9;padding:10px;border-radius:6px}
	</style>
</head>
<body>
	<div class="container">
		<h1>Momentum</h1>
		<p>Fetches momentum indicators for one or multiple tickers (comma-separated).</p>

		<div class="controls">
			<input id="q" type="text" placeholder="Tickers (e.g. AMZN or AMZN,TSLA)" />
			<button id="fetchBtn">Fetch</button>
		</div>

		<div id="output"></div>
	</div>

	<script>
		const apiBase = 'https://yfinance-phi.vercel.app/momentum/';

		function qs(name){
			const params = new URLSearchParams(location.search);
			return params.get(name);
		}

		function fmt(num, digits=2){
			if (num==null || isNaN(num)) return '—';
			return Number(num).toLocaleString(undefined,{maximumFractionDigits:digits});
		}

		function colorForPct(p){
			if (p == null) return ''; return p >= 0 ? 'good' : 'bad';
		}

		function renderItem(d){
			const div = document.createElement('div');
			div.className = 'card';
			const header = `
				<div style="display:flex;justify-content:space-between;align-items:center">
					<div>
						<div style="font-size:22px;font-weight:800">${d.ticker}</div>
						<div style="color:#666">Price: <strong>${fmt(d.current_price,2)}</strong>
							<small style="margin-left:8px;color:${d.pct_change>=0?'green':'crimson'}">(${fmt(d.pct_change,2)}%)</small>
						</div>
					</div>
					<div style="text-align:right">
						<div style="font-size:12px;color:#666">52w</div>
						<div>${fmt(d['52w_low'],2)} — ${fmt(d['52w_high'],2)}</div>
						<div style="font-size:12px;color:#999">${fmt(d.pct_from_52w_high,2)}% from high</div>
					</div>
				</div>
			`;
			div.innerHTML = header;

			const rows = document.createElement('div'); rows.className='row';

			const metrics = [
				{k:'rsi_14',label:'RSI (14)'},
				{k:'macd',label:'MACD (macd / signal / hist)'},
				{k:'adx',label:'ADX'},
				{k:'stochastic',label:'Stochastic K/D'},
				{k:'roc_10',label:'ROC 10'},
				{k:'roc_20',label:'ROC 20'},
				{k:'ma50',label:'MA50'},
				{k:'ma200',label:'MA200'},
				{k:'volume_ratio',label:'Volume Ratio'},
			];

			metrics.forEach(m=>{
				const el = document.createElement('div'); el.className='metric';
				const label = document.createElement('div'); label.className='label'; label.textContent = m.label;
				const value = document.createElement('div'); value.className='value';
				if (m.k === 'macd' && d.macd){
					value.textContent = `${fmt(d.macd.macd,2)} / ${fmt(d.macd.signal,2)} / ${fmt(d.macd.hist,2)}`;
				} else if (m.k === 'stochastic' && d.stochastic){
					value.textContent = `${fmt(d.stochastic.k,2)} / ${fmt(d.stochastic.d,2)}`;
				} else {
					value.textContent = fmt(d[m.k]);
				}
				el.appendChild(label); el.appendChild(value); rows.appendChild(el);
			});

			div.appendChild(rows);

			const extras = document.createElement('div'); extras.style.marginTop='12px';
			extras.innerHTML = `
				<div class="row">
					<div class="metric"><div class="label">MA Signal</div><div class="value">${d.ma_signal||'—'}</div></div>
					<div class="metric"><div class="label">Volume Signal</div><div class="value">${d.volume_signal||'—'}</div></div>
					<div class="metric"><div class="label">OBV Trend</div><div class="value">${d.obv_trend||'—'}</div></div>
				</div>
				<div class="row" style="margin-top:8px">
					<div class="metric"><div class="label">Divergence</div><div class="value">${d.divergence||'—'}</div></div>
					<div class="metric"><div class="label">Bullish Signals</div><div class="value">${d.bullish_signals ?? '—'}</div></div>
				</div>
			`;
			div.appendChild(extras);

			const verdict = document.createElement('div'); verdict.className='verdict';
			const v = (d.verdict||'').toString();
			if (v.toLowerCase().includes('bear')) verdict.classList.add('bad');
			else if (v.toLowerCase().includes('bull')) verdict.classList.add('good');
			else verdict.classList.add('warn');
			verdict.textContent = v || 'No verdict';

			div.appendChild(verdict);

			const debug = document.createElement('details'); debug.style.marginTop='12px';
			debug.innerHTML = `<summary>Raw JSON</summary><pre>${JSON.stringify(d,null,2)}</pre>`;
			div.appendChild(debug);

			return div;
		}

		async function fetchAndRender(q){
			const out = document.getElementById('output'); out.innerHTML = '';
			if (!q){ out.textContent = 'Enter a ticker or tickers.'; return; }
			const busy = document.createElement('div'); busy.textContent = 'Loading...'; out.appendChild(busy);
			try{
				const resp = await fetch(apiBase + encodeURIComponent(q));
				if (!resp.ok) throw new Error(resp.status + ' ' + resp.statusText);
				const json = await resp.json();
				out.innerHTML = '';
				// API returns object for single ticker or array/multiple
				if (Array.isArray(json)){
					json.forEach(item=> out.appendChild(renderItem(item)));
				} else if (json && json.ticker){
					out.appendChild(renderItem(json));
				} else if (typeof json === 'object'){
					// might be keyed by ticker
					Object.values(json).forEach(item=> out.appendChild(renderItem(item)));
				} else {
					out.textContent = 'Unexpected response: ' + JSON.stringify(json);
				}
			}catch(err){
				out.innerHTML = `<div class="card"><strong>Error:</strong> ${err.message}</div>`;
			}
		}

		document.getElementById('fetchBtn').addEventListener('click', ()=>{
			const q = document.getElementById('q').value.trim();
			fetchAndRender(q);
		});

		// initialize from ?q= or default
		(function init(){
			const param = qs('q');
			const input = document.getElementById('q');
			if (param){ input.value = param; fetchAndRender(param); }
			else { input.value = 'AMZN'; }
		})();
	</script>
</body>
</html>
