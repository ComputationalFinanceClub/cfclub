<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Forward P/E Lookup</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚛</text></svg>" />
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="../index.html" class="logo"></a>
            <button onclick="openModal()">Sign Up</button>
        </div>
    </nav>

    <main>
        <article>
            <h2>Get forward p/e for one or more stocks</h2>
            <p class="muted">Enter one or more ticker symbols separated by commas</p>

            <input id="tickers" type="text" placeholder="V, SHW, AAPL" />
            <button id="lookupBtn">Lookup</button>
            <span id="status" class="muted" aria-live="polite"></span>

            <div id="result"></div>
        </article>
    </main>

    <script src="../scripts/footer.js"></script>
    <script>
        const input = document.getElementById('tickers');
        const btn = document.getElementById('lookupBtn');
        const result = document.getElementById('result');
        const status = document.getElementById('status');

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') fetchPE(); });
        btn.addEventListener('click', fetchPE);

        function setStatus(msg) { status.textContent = msg || ''; }

        function renderTable(tickerOrder, tickersObj) {
            if (!tickersObj || Object.keys(tickersObj).length === 0) {
                result.innerHTML = '<p class="error">No data returned for the requested tickers.</p>';
                return;
            }

            let html = '<table><thead><tr><th>Ticker</th><th>Price</th><th>Trailing EPS</th><th>Forward EPS</th><th>Forward P/E</th></tr></thead><tbody>';
            tickerOrder.forEach(sym => {
                const d = tickersObj[sym];
                if (!d) {
                    html += `<tr><td>${sym}</td><td colspan="4" class="muted">No data</td></tr>`;
                    return;
                }
                const cp = (d.currentPrice == null) ? '—' : d.currentPrice.toFixed(2);
                const tEPS = (d.trailingEPS == null) ? '—' : d.trailingEPS.toFixed(2);
                const fEPS = (d.forwardEPS == null) ? '—' : d.forwardEPS.toFixed(2);
                const fPE = (d.forwardPE == null) ? '—' : (typeof d.forwardPE === 'number' ? d.forwardPE.toFixed(2) : d.forwardPE);

                html += `<tr>
                    <td>${sym}</td>
                    <td>${cp}</td>
                    <td>${tEPS}</td>
                    <td>${fEPS}</td>
                    <td>${fPE}</td>
                </tr>`;
            });
            html += '</tbody></table>';

            result.innerHTML = html;
        }

        function escapeHtml(s) {
            return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        async function fetchPE() {
            const raw = input.value || '';
            setStatus('');
            result.innerHTML = '';
            const tickers = raw.split(',')
                                .map(s => s.trim().toUpperCase())
                                .filter(Boolean);
            if (tickers.length === 0) {
                result.innerHTML = '<p class="error">Please enter at least one ticker symbol.</p>';
                return;
            }

            const q = encodeURIComponent(tickers.join(','));
            const url = `https://yfinance-phi.vercel.app/fwd-pe/multiple/?tickers=${q}`;

            setStatus('Loading…');
            btn.disabled = true;

            try {
                const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
                if (!res.ok) {
                    throw new Error('Network response was not ok: ' + res.status);
                }
                const json = await res.json();
                // Expected shape: { tickers: { "V": { ... }, ... } }
                if (!json || !json.tickers) {
                    throw new Error('Unexpected response shape');
                }
                // Render using requested order
                const normalized = {};
                // Normalize keys to uppercase to match user input
                for (const key in json.tickers) {
                    normalized[key.toUpperCase()] = json.tickers[key];
                }
                renderTable(tickers, normalized);
            } catch (err) {
                result.innerHTML = `<p class="error">Lookup failed: ${err.message}</p>`;
            } finally {
                setStatus('');
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
